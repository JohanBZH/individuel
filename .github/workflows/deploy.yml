name: Deploy Production

on:
  push:
    branches: ["prod"]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    # Needs permissions to write to ghcr.io
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/meetrooms-web:latest
            ghcr.io/${{ github.repository }}/meetrooms-web:${{ github.sha }}

      - name: Execute Deployment Script via SSH
        run: |
          echo "Updating production server with the latest Docker image..."
          # In a real environment, you'd execute this via appleboy/ssh-action
          echo "ssh user@production-server 'docker pull ghcr.io/${{ github.repository }}/meetrooms-web:latest && docker-compose up -d --no-deps web_prod'"
          echo "✅ Deployment finished successfully. Image is safely archived in the registry."
